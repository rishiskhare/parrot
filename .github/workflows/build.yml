name: "Build"

on:
  workflow_call:
    inputs:
      platform:
        required: true
        type: string
      target:
        required: true
        type: string
      build-args:
        required: false
        type: string
        default: ""
      release-id:
        required: false
        type: string
      asset-prefix:
        required: false
        type: string
        default: "parrot"
      asset-name-pattern:
        required: false
        type: string
        default: ""
      upload-artifacts:
        required: false
        type: boolean
        default: false
      sign-binaries:
        required: false
        type: boolean
        default: false
      repository:
        required: false
        type: string
      ref:
        required: false
        type: string
        default: ${{ github.ref }}
      is-debug-build:
        required: false
        type: boolean
        default: false

jobs:
  build:
    permissions:
      contents: write
    runs-on: ${{ inputs.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Get version from tauri.conf.json
        id: get-version
        shell: bash
        run: |
          VERSION=$(grep -o '"version": "[^"]*"' src-tauri/tauri.conf.json | cut -d'"' -f4)
          echo "Application version from tauri.conf.json: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Determine build profile
        id: build-profile
        shell: bash
        run: |
          if [[ "${{ inputs.is-debug-build }}" == "true" ]]; then
            echo "profile=debug" >> "$GITHUB_OUTPUT"
            echo "Build profile: debug"
          else
            echo "profile=release" >> "$GITHUB_OUTPUT"
            echo "Build profile: release"
          fi

      - name: Setup Bun (standard)
        if: ${{ !(contains(inputs.platform, 'windows') && contains(inputs.target, 'aarch64')) }}
        uses: oven-sh/setup-bun@v2

      # Bun does not fully support Windows ARM64 yet, so we pin the baseline build.
      # See https://github.com/oven-sh/bun/issues/9824 for details.
      - name: Setup Bun (Windows ARM64 baseline)
        if: ${{ contains(inputs.platform, 'windows') && contains(inputs.target, 'aarch64') }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-download-url: "https://github.com/oven-sh/bun/releases/latest/download/bun-windows-x64-baseline.zip"

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ contains(inputs.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: ${{ inputs.platform }}-${{ inputs.target }}

      - name: install dependencies (ubuntu 24.04 x64)
        if: contains(inputs.platform, 'ubuntu-24.04') && !contains(inputs.platform, 'arm')
        run: |
          sudo apt-get update
          sudo apt-get install -y libappindicator3-dev librsvg2-dev patchelf libasound2-dev libopenblas-dev libx11-dev libxtst-dev libxrandr-dev libgtk-layer-shell0 libgtk-layer-shell-dev \
            libwebkit2gtk-4.1-0=2.44.0-2 \
            libwebkit2gtk-4.1-dev=2.44.0-2 \
            libjavascriptcoregtk-4.1-0=2.44.0-2 \
            libjavascriptcoregtk-4.1-dev=2.44.0-2 \
            gir1.2-javascriptcoregtk-4.1=2.44.0-2 \
            gir1.2-webkit2-4.1=2.44.0-2

      - name: install dependencies (ubuntu 24.04 arm64)
        if: contains(inputs.platform, 'ubuntu-24.04-arm')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev libopenblas-dev libx11-dev libxtst-dev libxrandr-dev libgtk-layer-shell0 libgtk-layer-shell-dev xdg-utils

      - name: install dependencies (ubuntu 22.04)
        if: contains(inputs.platform, 'ubuntu-22.04') && !contains(inputs.platform, 'arm')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev libopenblas-dev libx11-dev libxtst-dev libxrandr-dev libgtk-layer-shell0 libgtk-layer-shell-dev

      - name: Verify gtk-layer-shell runtime dependency (Ubuntu)
        if: contains(inputs.platform, 'ubuntu')
        run: |
          dpkg-query -W -f='${Status}\n' libgtk-layer-shell0 | grep -q "install ok installed"
          ldconfig -p | grep -q "libgtk-layer-shell.so.0"

      - name: Install Vulkan SDK (Windows x64)
        if: contains(inputs.platform, 'windows') && !contains(inputs.target, 'aarch64')
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.309.0
          cache: true

      # humbletim/install-vulkan-sdk@v1.2 cannot target Windows ARM64 yet.
      # Download prebuilt binaries (Bin) + build headers/libs from source.
      # See https://github.com/humbletim/install-vulkan-sdk/pull/22 for prebuilt ARM64 support progress.
      - name: Prepare Vulkan SDK env (Windows ARM64)
        if: contains(inputs.platform, 'windows') && contains(inputs.target, 'aarch64')
        shell: pwsh
        run: |
          $sdkDir = Join-Path $env:GITHUB_WORKSPACE "VULKAN_SDK"
          New-Item -ItemType Directory -Force -Path $sdkDir | Out-Null
          Add-Content -Path $env:GITHUB_ENV -Value "VULKAN_SDK=$sdkDir"

      - name: Download Vulkan SDK binaries (Windows ARM64)
        if: contains(inputs.platform, 'windows') && contains(inputs.target, 'aarch64')
        shell: pwsh
        run: |
          $url = "https://sdk.lunarg.com/sdk/download/1.4.309.0/warm/InstallVulkanARM64-1.4.309.0.exe"
          $outFile = "vulkan_sdk_arm.exe"
          Write-Host "Downloading Vulkan SDK binaries from $url"
          Invoke-WebRequest -Uri $url -OutFile $outFile

      - name: Extract Vulkan SDK binaries (Windows ARM64)
        if: contains(inputs.platform, 'windows') && contains(inputs.target, 'aarch64')
        shell: pwsh
        run: |
          $sdkDir = $env:VULKAN_SDK
          $sevenZip = (Get-Command 7z.exe -ErrorAction Stop).Source
          Write-Host "Extracting binaries to $sdkDir"
          & $sevenZip x "./vulkan_sdk_arm.exe" "-o$sdkDir" -aoa
          $binPath = Join-Path $sdkDir "Bin"
          Add-Content -Path $env:GITHUB_PATH -Value $binPath
          Write-Host "Verifying glslc..."
          & (Join-Path $binPath "glslc.exe") --version

      - name: Build Vulkan SDK headers and libs (Windows ARM64)
        if: contains(inputs.platform, 'windows') && contains(inputs.target, 'aarch64')
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-query-version: 1.4.309.0
          vulkan-components: Vulkan-Headers, Vulkan-Loader
          vulkan-use-cache: true

      - name: Install trusted-signing-cli
        if: contains(inputs.platform, 'windows') && inputs.sign-binaries
        run: cargo install trusted-signing-cli

      - name: Prepare Vulkan SDK for Ubuntu 24.04
        if: contains(inputs.platform, 'ubuntu-24.04') && !contains(inputs.platform, 'arm')
        run: |
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-1.3.290-noble.list https://packages.lunarg.com/vulkan/1.3.290/lunarg-vulkan-1.3.290-noble.list
          sudo apt update
          sudo apt install vulkan-sdk -y
          sudo apt-get install -y mesa-vulkan-drivers

      - name: Prepare Vulkan SDK for Ubuntu ARM64
        if: contains(inputs.platform, 'ubuntu') && contains(inputs.platform, 'arm')
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: 1.4.335.0
          cache: true

      - name: Install Vulkan runtime libraries (Ubuntu ARM64)
        if: contains(inputs.platform, 'ubuntu') && contains(inputs.platform, 'arm')
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev mesa-vulkan-drivers

      - name: Prepare Vulkan SDK for Ubuntu 22.04
        if: contains(inputs.platform, 'ubuntu-22.04') && !contains(inputs.platform, 'arm')
        run: |
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-1.3.290-jammy.list https://packages.lunarg.com/vulkan/1.3.290/lunarg-vulkan-1.3.290-jammy.list
          sudo apt update
          sudo apt install vulkan-sdk -y
          sudo apt-get install -y mesa-vulkan-drivers

      - name: install frontend dependencies
        if: ${{ !(contains(inputs.platform, 'windows') && contains(inputs.target, 'aarch64')) }}
        run: bun install

      - name: install frontend dependencies (Windows ARM64)
        if: ${{ contains(inputs.platform, 'windows') && contains(inputs.target, 'aarch64') }}
        run: bun install --cpu=arm64

      - name: rustup install target
        if: ${{ inputs.target != '' && !contains(inputs.target, 'x86_64-unknown-linux-gnu') && !contains(inputs.target, 'aarch64-unknown-linux-gnu') && !contains(inputs.target, 'x86_64-pc-windows-msvc') }}
        run: rustup target add ${{ inputs.target }}

      - name: import Apple Developer Certificate
        if: contains(inputs.platform, 'macos') && inputs.sign-binaries
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "APPLE_CERTIFICATE not set — building unsigned"
            exit 0
          fi
          # Export to GITHUB_ENV so the Build step inherits them without needing
          # them in its env block (where absent secrets evaluate to empty string,
          # which Tauri misinterprets as "signing requested").
          echo "APPLE_CERTIFICATE=$APPLE_CERTIFICATE" >> "$GITHUB_ENV"
          echo "APPLE_CERTIFICATE_PASSWORD=$APPLE_CERTIFICATE_PASSWORD" >> "$GITHUB_ENV"
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: verify certificate
        if: contains(inputs.platform, 'macos') && inputs.sign-binaries
        run: |
          if ! security list-keychains | grep -q "build.keychain"; then
            echo "No signing certificate — skipping verification, build will use ad-hoc signing"
            exit 0
          fi
          CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application")
          CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"
          echo "Certificate imported: $CERT_ID"

      - name: Configure updater signing key
        shell: bash
        env:
          TAURI_KEY_BASE64: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          # The signing key secret is stored as base64 (single line) to avoid
          # GitHub Actions percent-encoding newlines in multiline secrets.
          if [ -z "$TAURI_KEY_BASE64" ]; then
            echo "No updater signing key configured — updater artifacts will not be signed"
            exit 0
          fi
          decoded=$(echo "$TAURI_KEY_BASE64" | base64 -d)
          {
            echo 'TAURI_SIGNING_PRIVATE_KEY<<__TAURI_KEY_END__'
            echo "$decoded"
            echo '__TAURI_KEY_END__'
          } >> "$GITHUB_ENV"
          echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$TAURI_KEY_PASSWORD" >> "$GITHUB_ENV"
          echo "Updater signing key configured"

      - name: Patch asset name pattern
        id: patch-release-name
        shell: bash
        if: ${{ inputs.release-id != '' && inputs.asset-name-pattern != '' }}
        run: |
          platform="${{ inputs.platform }}"
          replacement="$(echo ${platform} | sed -E 's/-latest//')"
          patched_platform=$(echo '${{ inputs.asset-name-pattern }}' | sed -E "s/\[platform\]/${replacement}/")
          if [[ -n "${{ inputs.asset-prefix }}" ]]; then
            patched_platform="${{ inputs.asset-prefix }}_${patched_platform}"
          fi
          echo "platform=${patched_platform}" >> $GITHUB_OUTPUT

      - name: Bundle espeak-ng binary (macOS)
        if: contains(inputs.platform, 'macos')
        run: |
          set -euo pipefail
          brew install espeak-ng
          DEST="src-tauri/resources/espeak-ng"
          mkdir -p "$DEST"

          PREFIX="$(brew --prefix espeak-ng)"
          cp "$PREFIX/bin/espeak-ng" "$DEST/espeak-ng"

          # Bundle shared libraries that espeak-ng links against.
          # Without these, the binary crashes on machines without Homebrew.
          cp "$PREFIX/lib/libespeak-ng.1.dylib" "$DEST/"
          PCAUDIO="$(brew --prefix pcaudiolib)/lib/libpcaudio.0.dylib"
          if [ -f "$PCAUDIO" ]; then
            cp "$PCAUDIO" "$DEST/"
          fi

          # Make files writable so install_name_tool can modify them
          # (Homebrew copies may be read-only).
          chmod u+w "$DEST"/*

          # Rewrite dylib load paths so the binary finds libraries next to
          # itself (@executable_path) instead of at absolute Homebrew paths.
          # macOS SIP strips DYLD_LIBRARY_PATH for hardened-runtime binaries,
          # so install_name_tool is the only reliable mechanism.
          #
          # Read actual embedded paths from the binary (brew --prefix returns
          # a symlink that may differ from the Cellar path stored in the binary).
          ESPEAK_LIB="$(otool -L "$DEST/espeak-ng" | grep libespeak-ng | awk '{print $1}')"
          PCAUDIO_LIB="$(otool -L "$DEST/espeak-ng" | grep libpcaudio | awk '{print $1}' || true)"

          install_name_tool -change "$ESPEAK_LIB" "@executable_path/libespeak-ng.1.dylib" "$DEST/espeak-ng"
          if [ -n "$PCAUDIO_LIB" ] && [ -f "$DEST/libpcaudio.0.dylib" ]; then
            install_name_tool -change "$PCAUDIO_LIB" "@executable_path/libpcaudio.0.dylib" "$DEST/espeak-ng"
            # libespeak-ng.dylib itself may also link to pcaudiolib
            PCAUDIO_IN_LIB="$(otool -L "$DEST/libespeak-ng.1.dylib" | grep libpcaudio | awk '{print $1}' || true)"
            if [ -n "$PCAUDIO_IN_LIB" ]; then
              install_name_tool -change "$PCAUDIO_IN_LIB" "@loader_path/libpcaudio.0.dylib" "$DEST/libespeak-ng.1.dylib"
            fi
          fi

          # Verify the rewritten paths resolve correctly
          echo "--- espeak-ng dylib references ---"
          otool -L "$DEST/espeak-ng"

          # Codesign all bundled binaries with hardened runtime and secure
          # timestamp.  Apple notarization rejects unsigned executables and
          # dylibs inside the app bundle.
          if [ -n "${APPLE_SIGNING_IDENTITY:-}" ]; then
            for f in "$DEST"/*.dylib "$DEST/espeak-ng"; do
              codesign --force --options runtime --timestamp \
                --sign "$APPLE_SIGNING_IDENTITY" "$f"
            done
            codesign --verify --verbose "$DEST/espeak-ng"
            echo "Signed and verified all bundled espeak-ng files"
          else
            echo "No signing identity — bundled espeak-ng will be unsigned"
          fi

      - name: Bundle espeak-ng binary (Ubuntu)
        if: contains(inputs.platform, 'ubuntu')
        run: |
          set -euo pipefail
          sudo apt-get install -y espeak-ng libespeak-ng1 patchelf
          DEST="src-tauri/resources/espeak-ng"
          mkdir -p "$DEST"
          cp "$(which espeak-ng)" "$DEST/espeak-ng"

          # Bundle shared libraries so the binary works on systems without
          # espeak-ng installed.  LD_LIBRARY_PATH is set at runtime by
          # tts-rs to point at the binary's parent directory.
          for lib in libespeak-ng.so.1 libpcaudio.so.0; do
            LIB_PATH="$(ldconfig -p | grep "$lib" | head -1 | awk '{print $NF}')"
            if [ -n "$LIB_PATH" ] && [ -f "$LIB_PATH" ]; then
              cp "$LIB_PATH" "$DEST/"
              echo "Bundled $lib from $LIB_PATH"
            else
              echo "Warning: $lib not found, skipping"
            fi
          done

          # Set RPATH so the binary looks next to itself for shared libs
          if command -v patchelf &>/dev/null; then
            patchelf --set-rpath '$ORIGIN' "$DEST/espeak-ng"
            echo "Set RPATH to \$ORIGIN"
          else
            echo "patchelf not available — relying on LD_LIBRARY_PATH at runtime"
          fi

      - name: Bundle espeak-ng binary (Windows)
        if: contains(inputs.platform, 'windows')
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $espeakVersion = "1.51"
          $msiUrl = "https://github.com/espeak-ng/espeak-ng/releases/download/$espeakVersion/espeak-ng-X64.msi"
          Invoke-WebRequest -Uri $msiUrl -OutFile espeak-ng.msi
          $installDir = "$PWD\espeak-install"
          Start-Process msiexec -ArgumentList "/i","espeak-ng.msi","/qn","INSTALLDIR=$installDir" -Wait -NoNewWindow

          $bin = Get-ChildItem -Path $installDir -Recurse -Filter "espeak-ng.exe" | Select-Object -First 1
          if (-not $bin) { throw "espeak-ng.exe not found after MSI install" }
          New-Item -ItemType Directory -Force -Path "src-tauri\resources\espeak-ng" | Out-Null
          Copy-Item $bin.FullName "src-tauri\resources\espeak-ng\espeak-ng.exe"

          # Bundle DLLs from the same directory as the exe.
          # Windows searches the exe's directory first for DLLs, so placing
          # them alongside espeak-ng.exe is sufficient.
          $binDir = $bin.DirectoryName
          Get-ChildItem -Path $binDir -Filter "*.dll" | ForEach-Object {
            Copy-Item $_.FullName "src-tauri\resources\espeak-ng\"
            Write-Host "Bundled DLL: $($_.Name)"
          }
          Write-Host "Bundled espeak-ng from: $($bin.FullName)"

      - name: Bundle ONNX Runtime shared library (Unix)
        if: contains(inputs.platform, 'macos') || contains(inputs.platform, 'ubuntu')
        shell: bash
        run: |
          set -euo pipefail

          ORT_VERSION="1.23.1"
          case "${{ inputs.target }}" in
            x86_64-apple-darwin)
              ASSET="onnxruntime-osx-x86_64-${ORT_VERSION}.tgz"
              LIB_GLOB='libonnxruntime*.dylib'
              ;;
            aarch64-apple-darwin)
              ASSET="onnxruntime-osx-arm64-${ORT_VERSION}.tgz"
              LIB_GLOB='libonnxruntime*.dylib'
              ;;
            x86_64-unknown-linux-gnu)
              ASSET="onnxruntime-linux-x64-${ORT_VERSION}.tgz"
              LIB_GLOB='libonnxruntime.so*'
              ;;
            aarch64-unknown-linux-gnu)
              ASSET="onnxruntime-linux-aarch64-${ORT_VERSION}.tgz"
              LIB_GLOB='libonnxruntime.so*'
              ;;
            *)
              echo "Unsupported target for ONNX Runtime bundling: ${{ inputs.target }}"
              exit 1
              ;;
          esac

          TMP_DIR="$(mktemp -d)"
          ARCHIVE_PATH="${TMP_DIR}/${ASSET}"
          DEST="src-tauri/resources/onnxruntime"
          mkdir -p "$DEST"

          curl -fsSL "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/${ASSET}" -o "$ARCHIVE_PATH"
          tar -xzf "$ARCHIVE_PATH" -C "$TMP_DIR"

          LIB_DIR="$(find "$TMP_DIR" -type d \( -name lib -o -name lib64 \) | head -n 1)"
          if [ -z "$LIB_DIR" ]; then
            echo "Unable to find ONNX Runtime library directory in ${ASSET}"
            exit 1
          fi

          find "$LIB_DIR" -maxdepth 1 -name "$LIB_GLOB" -exec cp -L {} "$DEST/" \;
          if ! find "$DEST" -maxdepth 1 \( -type f -o -type l \) | grep -q .; then
            echo "No ONNX Runtime libraries were copied for target ${{ inputs.target }}"
            exit 1
          fi

          echo "Bundled ONNX Runtime files:"
          ls -la "$DEST"

      - name: Bundle ONNX Runtime shared library (Windows)
        if: contains(inputs.platform, 'windows')
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $ortVersion = "1.23.1"
          if ("${{ inputs.target }}" -like "*aarch64*") {
            $asset = "onnxruntime-win-arm64-$ortVersion.zip"
          } else {
            $asset = "onnxruntime-win-x64-$ortVersion.zip"
          }

          $tmpDir = Join-Path $env:RUNNER_TEMP "onnxruntime"
          Remove-Item -Recurse -Force $tmpDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $tmpDir | Out-Null

          $archivePath = Join-Path $tmpDir $asset
          Invoke-WebRequest -Uri "https://github.com/microsoft/onnxruntime/releases/download/v$ortVersion/$asset" -OutFile $archivePath
          Expand-Archive -LiteralPath $archivePath -DestinationPath $tmpDir -Force

          $dll = Get-ChildItem -Path $tmpDir -Recurse -Filter "onnxruntime.dll" | Select-Object -First 1
          if (-not $dll) {
            throw "onnxruntime.dll not found in $asset"
          }

          $dest = "src-tauri\resources\onnxruntime"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Get-ChildItem -Path $dll.DirectoryName -Filter "onnxruntime*.dll" | ForEach-Object {
            Copy-Item $_.FullName $dest
            Write-Host "Bundled ONNX Runtime DLL: $($_.Name)"
          }

      - name: Build with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ inputs.sign-binaries && secrets.APPLE_ID || '' }}
          APPLE_ID_PASSWORD: ${{ inputs.sign-binaries && secrets.APPLE_ID_PASSWORD || '' }}
          APPLE_PASSWORD: ${{ inputs.sign-binaries && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ inputs.sign-binaries && secrets.APPLE_TEAM_ID || '' }}
          AZURE_CLIENT_ID: ${{ inputs.sign-binaries && secrets.AZURE_CLIENT_ID || '' }}
          AZURE_CLIENT_SECRET: ${{ inputs.sign-binaries && secrets.AZURE_CLIENT_SECRET || '' }}
          AZURE_TENANT_ID: ${{ inputs.sign-binaries && secrets.AZURE_TENANT_ID || '' }}
          # APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY,
          # TAURI_SIGNING_PRIVATE_KEY, and TAURI_SIGNING_PRIVATE_KEY_PASSWORD are
          # inherited from GITHUB_ENV (set by earlier steps only when secrets exist).
          # They must NOT appear here — even an empty string triggers Tauri's signing
          # codepath, which fails when no real credential is present.
          WHISPER_NO_AVX: ${{ contains(inputs.platform, 'ubuntu') && !contains(inputs.platform, 'arm') && 'ON' || '' }}
          WHISPER_NO_AVX2: ${{ contains(inputs.platform, 'ubuntu') && !contains(inputs.platform, 'arm') && 'ON' || '' }}
        with:
          tagName: ${{ inputs.release-id && format('v{0}', steps.get-version.outputs.version) || '' }}
          releaseName: ${{ inputs.release-id && format('v{0}', steps.get-version.outputs.version) || '' }}
          releaseId: ${{ inputs.release-id }}
          assetNamePattern: ${{ steps.patch-release-name.outputs.platform }}
          args: ${{ inputs.build-args }}

      - name: Upload artifacts (macOS)
        if: inputs.upload-artifacts && contains(inputs.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.asset-prefix }}-${{ inputs.target }}
          path: |
            src-tauri/target/${{ inputs.target }}/${{ steps.build-profile.outputs.profile }}/bundle/dmg/*.dmg
            src-tauri/target/${{ inputs.target }}/${{ steps.build-profile.outputs.profile }}/bundle/macos/*.app
          retention-days: 30

      - name: Install FUSE for AppImage processing
        if: contains(inputs.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse libfuse2

      - name: Remove libwayland-client.so from AppImage
        if: contains(inputs.platform, 'ubuntu')
        run: |
          # Find the AppImage file
          APPIMAGE_PATH=$(find src-tauri/target/${{ steps.build-profile.outputs.profile }}/bundle/appimage -name "*.AppImage" | head -1)

          if [ -n "$APPIMAGE_PATH" ]; then
            echo "Processing AppImage: $APPIMAGE_PATH"

            # Make AppImage executable
            chmod +x "$APPIMAGE_PATH"

            # Extract AppImage
            cd "$(dirname "$APPIMAGE_PATH")"
            APPIMAGE_NAME=$(basename "$APPIMAGE_PATH")

            # Extract using the AppImage itself
            "./$APPIMAGE_NAME" --appimage-extract

            # Remove libwayland-client.so files
            echo "Removing libwayland-client.so files..."
            find squashfs-root -name "libwayland-client.so*" -type f -delete

            # List what was removed for verification
            echo "Files remaining in lib directories:"
            find squashfs-root -name "lib*" -type d | head -5 | while read dir; do
              echo "Contents of $dir:"
              ls "$dir" | grep -E "(wayland|fuse)" || echo "  No wayland/fuse libraries found"
            done

            # Detect architecture and get appropriate appimagetool
            if [[ "$(uname -m)" == "aarch64" ]]; then
              APPIMAGETOOL_ARCH="aarch64"
            else
              APPIMAGETOOL_ARCH="x86_64"
            fi

            wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-${APPIMAGETOOL_ARCH}.AppImage"
            chmod +x "appimagetool-${APPIMAGETOOL_ARCH}.AppImage"

            # Repackage AppImage with no-appstream to avoid warnings
            ARCH="${APPIMAGETOOL_ARCH}" "./appimagetool-${APPIMAGETOOL_ARCH}.AppImage" --no-appstream squashfs-root "$APPIMAGE_NAME"

            # Clean up
            rm -rf squashfs-root "appimagetool-${APPIMAGETOOL_ARCH}.AppImage"

            echo "libwayland-client.so removed from AppImage successfully"
          else
            echo "No AppImage found to process"
          fi

      - name: Upload artifacts (Linux)
        if: inputs.upload-artifacts && contains(inputs.platform, 'ubuntu')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.asset-prefix }}-${{ inputs.platform }}-${{ inputs.target }}
          path: |
            src-tauri/target/${{ steps.build-profile.outputs.profile }}/bundle/deb/*.deb
            src-tauri/target/${{ steps.build-profile.outputs.profile }}/bundle/appimage/*.AppImage
            src-tauri/target/${{ steps.build-profile.outputs.profile }}/bundle/rpm/*.rpm
          retention-days: 30

      - name: Upload artifacts (Windows)
        if: inputs.upload-artifacts && contains(inputs.platform, 'windows')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.asset-prefix }}-${{ inputs.target }}
          # Default Windows builds place bundles under release/, but cross-compiles (ARM64) nest under target/<triple>/release.
          path: |
            src-tauri/target/${{ inputs.target != '' && inputs.target != 'x86_64-pc-windows-msvc' && format('{0}/{1}', inputs.target, steps.build-profile.outputs.profile) || steps.build-profile.outputs.profile }}/bundle/msi/*.msi
            src-tauri/target/${{ inputs.target != '' && inputs.target != 'x86_64-pc-windows-msvc' && format('{0}/{1}', inputs.target, steps.build-profile.outputs.profile) || steps.build-profile.outputs.profile }}/bundle/nsis/*.exe
          retention-days: 30
